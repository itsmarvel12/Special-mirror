<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Mirror 💕</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Inter:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}

    body {
      background:#080608;
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      font-family:'Inter',sans-serif;
      position:relative;
    }

    /* Particles */
    .particle {
      position:fixed;
      pointer-events:none;
      animation:floatUp linear infinite;
      opacity:0;
      user-select:none;
      z-index:1;
    }
    @keyframes floatUp {
      0%  {transform:translateY(0) scale(0.8);opacity:0.8;}
      100%{transform:translateY(-110vh) scale(1.2);opacity:0;}
    }

    /* START SCREEN */
    #start-screen {
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:26px;
      z-index:10;
      text-align:center;
      padding:20px;
    }

    .headline {
      font-family:'Dancing Script',cursive;
      font-size:2rem;
      color:#ff6fa8;
      text-shadow:0 0 24px rgba(255,111,168,0.6);
    }

    /* PILL */
    #mirror-btn {
      position:relative;
      width:230px;
      height:80px;
      border-radius:50px;
      overflow:hidden;
      cursor:pointer;
      border:2px solid rgba(255,150,200,0.4);
      background:rgba(30,15,25,0.7);
      backdrop-filter:blur(12px);
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:0 0 30px rgba(255,111,168,0.3),inset 0 0 20px rgba(0,0,0,0.4);
      transition:transform 0.2s,box-shadow 0.3s;
    }
    #mirror-btn:active{transform:scale(0.97);}

    #preview-video {
      position:absolute;
      top:0;left:0;width:100%;height:100%;
      object-fit:cover;
      transform:scaleX(-1);
      opacity:0;
      transition:opacity 0.8s ease;
    }
    #preview-video.show{opacity:1;}

    #pill-frost {
      position:absolute;
      top:0;left:0;right:0;bottom:0;
      background:rgba(0,0,0,0.3);
      backdrop-filter:blur(2px);
      z-index:1;
      transition:background 0.5s;
    }
    #pill-frost.clear{background:rgba(0,0,0,0.1);backdrop-filter:blur(0px);}

    #mirror-label {
      position:relative;z-index:2;
      font-family:'Dancing Script',cursive;
      font-size:1.7rem;color:#fff;
      text-shadow:0 2px 16px rgba(0,0,0,0.9);
      pointer-events:none;
    }

    /* Ring light btn */
    #ringlight-btn {
      width:180px;height:48px;
      border-radius:50px;
      border:1px solid rgba(255,255,255,0.18);
      background:rgba(18,12,18,0.75);
      color:#f5e6a3;font-size:0.88rem;
      letter-spacing:1.5px;cursor:pointer;
      display:flex;align-items:center;justify-content:center;gap:8px;
      transition:all 0.3s;backdrop-filter:blur(8px);
      font-family:'Inter',sans-serif;
    }
    #ringlight-btn.active{
      background:rgba(245,230,163,0.12);
      border-color:rgba(245,230,163,0.6);
      box-shadow:0 0 24px rgba(245,230,163,0.35);
    }

    .tap-hint{
      font-family:'Dancing Script',cursive;
      font-size:1.15rem;color:#ff9ecb;opacity:0.75;
    }

    /* MIRROR FULLSCREEN */
    #mirror-screen {
      display:none;
      position:fixed;
      top:0;left:0;width:100vw;height:100vh;
      background:#000;z-index:200;
    }

    #camera-video {
      width:100%;height:100%;
      object-fit:cover;
      transform:scaleX(-1);
      display:block;
    }

    /* ══ RING LIGHT — bright white border glow ══ */
    #ring-light-effect {
      position:absolute;
      top:0;left:0;right:0;bottom:0;
      pointer-events:none;
      z-index:6;
      opacity:0;
      transition:opacity 0.5s ease;
      /* Thick bright glowing border */
      box-shadow:
        inset 0 0 0 6px rgba(255,255,255,0.85),
        inset 0 0 30px 8px rgba(255,240,255,0.4),
        inset 0 0 80px 20px rgba(255,220,240,0.2),
        0 0 40px 15px rgba(255,200,230,0.3),
        0 0 80px 30px rgba(255,180,220,0.15);
    }
    #ring-light-effect.on{opacity:1;}

    /* Screen brightness boost when ring on */
    #brightness-boost {
      position:absolute;
      top:0;left:0;right:0;bottom:0;
      pointer-events:none;
      z-index:5;
      opacity:0;
      background:
        radial-gradient(ellipse at 10% 50%, rgba(255,255,255,0.06) 0%, transparent 50%),
        radial-gradient(ellipse at 90% 50%, rgba(255,255,255,0.06) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 5%,  rgba(255,255,255,0.05) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 95%, rgba(255,255,255,0.05) 0%, transparent 50%);
      transition:opacity 0.5s;
    }
    #brightness-boost.on{opacity:1;}

    /* HUD */
    #mirror-hud {
      position:absolute;
      top:0;left:0;right:0;bottom:0;
      z-index:10;pointer-events:none;
    }

    /* COMPLIMENT */
    #compliment-wrap {
      position:absolute;
      bottom:90px;left:0;right:0;
      display:flex;justify-content:center;
      opacity:0;
      transition:opacity 0.9s ease;
      pointer-events:none;
    }
    #compliment-wrap.visible{opacity:1;}

    #compliment-box {
      font-family:'Dancing Script',cursive;
      font-size:1.5rem;
      color:#ffb3d9;
      text-shadow:0 0 25px rgba(255,100,170,0.9),0 0 50px rgba(255,100,170,0.5);
      background:rgba(0,0,0,0.3);
      padding:12px 32px;
      border-radius:40px;
      border:1px solid rgba(255,150,200,0.25);
      backdrop-filter:blur(8px);
      max-width:88%;
      text-align:center;
    }
    @keyframes popIn{
      0%  {transform:scale(0.85) translateY(10px);opacity:0;}
      65% {transform:scale(1.04) translateY(-2px);}
      100%{transform:scale(1) translateY(0);opacity:1;}
    }
    .pop-in{animation:popIn 0.6s ease forwards;}

    /* Status */
    #status-wrap{
      position:absolute;top:18px;right:18px;
      display:flex;flex-direction:column;gap:8px;align-items:flex-end;
    }
    .s-badge{
      font-size:0.68rem;letter-spacing:1.5px;
      padding:5px 13px;border-radius:20px;
      background:rgba(0,0,0,0.5);
      border:1px solid rgba(255,255,255,0.1);
      backdrop-filter:blur(6px);color:#999;
      display:flex;align-items:center;gap:6px;
    }
    .s-dot{width:6px;height:6px;border-radius:50%;background:#444;}
    .s-dot.on{background:#4caf50;box-shadow:0 0 6px #4caf50;}
    .s-dot.warn{background:#ff9800;box-shadow:0 0 6px #ff9800;}

    #close-mirror{
      pointer-events:all;
      position:absolute;top:18px;left:18px;
      background:rgba(0,0,0,0.5);
      border:1px solid rgba(255,255,255,0.15);
      color:#ccc;padding:7px 16px;
      font-size:0.7rem;letter-spacing:2px;
      cursor:pointer;border-radius:20px;
      backdrop-filter:blur(6px);transition:all 0.2s;
      font-family:'Inter',sans-serif;
    }
    #close-mirror:hover{color:#fff;border-color:#fff;}

    #rl-toggle{
      pointer-events:all;
      position:absolute;bottom:24px;left:50%;transform:translateX(-50%);
      background:rgba(0,0,0,0.5);
      border:1px solid rgba(245,230,163,0.3);
      color:#f5e6a3;padding:10px 28px;
      font-size:0.72rem;letter-spacing:2px;
      cursor:pointer;border-radius:30px;
      backdrop-filter:blur(8px);transition:all 0.3s;
      font-family:'Inter',sans-serif;
      white-space:nowrap;
    }
    #rl-toggle.active{
      background:rgba(245,230,163,0.1);
      border-color:rgba(245,230,163,0.7);
      box-shadow:0 0 20px rgba(245,230,163,0.35);
      color:#fff9c4;
    }
  </style>
</head>
<body>

<!-- START SCREEN -->
<div id="start-screen">
  <div class="headline">look who's beautiful today&nbsp;✨</div>

  <div id="mirror-btn" onclick="openMirror()">
    <video id="preview-video" autoplay playsinline muted></video>
    <div id="pill-frost"></div>
    <span id="mirror-label">Mirror 🪞</span>
  </div>

  <button id="ringlight-btn" onclick="toggleRLStart()">💡&nbsp; Ring Light</button>
  <div class="tap-hint">tap for a surprise&nbsp;💕</div>
</div>

<!-- MIRROR FULLSCREEN -->
<div id="mirror-screen">
  <video id="camera-video" autoplay playsinline muted></video>
  <div id="brightness-boost"></div>
  <div id="ring-light-effect"></div>

  <div id="mirror-hud">
    <button id="close-mirror" onclick="closeMirror()">✕ Close</button>

    <div id="status-wrap">
      <div class="s-badge">
        <div class="s-dot" id="person-dot"></div>
        <span id="person-txt">Waiting...</span>
      </div>
      <div class="s-badge">
        <div class="s-dot" id="light-dot"></div>
        <span id="light-txt">Checking light</span>
      </div>
    </div>

    <div id="compliment-wrap">
      <div id="compliment-box"></div>
    </div>

    <button id="rl-toggle" onclick="toggleRLMirror()">💡&nbsp; RING LIGHT</button>
  </div>
</div>

<script>
// ── State ─────────────────────────────────────────────
let previewStream = null;
let fullStream    = null;
let ringOn        = false;
let autoRing      = false;
let personPresent = false;
let lastIdx       = -1;
let lightTimer    = null;
let complTimer    = null;
let motionTimer   = null;
let prevPixels    = null;

const COMPLIMENTS = [
  '✨ look who\'s beautiful today',
  '💖 seriously, you\'re glowing right now',
  '🌸 prettiest person in the room',
  '💫 that smile could light up the world',
  '👑 royally gorgeous as always',
  '🦋 you were born to shine like this',
  '💎 even the mirror can\'t stop staring',
  '🌟 you\'re giving main character energy',
  '🌹 effortlessly, undeniably beautiful',
  '💝 the world is lucky to see this face',
  '🔥 absolutely stunning today',
  '🫶 that face deserves to be adored',
  '⭐ you make everything look good',
  '🩷 this view? could stare forever',
];

// Particles
const PTCL=['💕','✨','🌸','💖','⭐','💫','🌟','💗','🩷'];
(function(){
  for(let i=0;i<22;i++){
    const el=document.createElement('div');
    el.className='particle';
    el.textContent=PTCL[Math.floor(Math.random()*PTCL.length)];
    el.style.cssText=`left:${Math.random()*100}vw;bottom:-30px;font-size:${0.6+Math.random()*0.9}rem;animation-duration:${6+Math.random()*9}s;animation-delay:${Math.random()*8}s;`;
    document.body.appendChild(el);
  }
})();

// ── Preview in pill on load ────────────────────────────
window.addEventListener('load', async ()=>{
  try {
    previewStream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'user'},audio:false});
    const pv = document.getElementById('preview-video');
    pv.srcObject = previewStream;
    await pv.play();
    pv.classList.add('show');
    document.getElementById('pill-frost').classList.add('clear');
    document.getElementById('mirror-label').style.display='none';
  } catch(e){ console.warn('Preview denied',e); }
});

// ── Ring Light toggle (start screen) ─────────────────
function toggleRLStart(){
  ringOn=!ringOn;
  document.getElementById('ringlight-btn').classList.toggle('active',ringOn);
}

// ── Open fullscreen mirror ────────────────────────────
async function openMirror(){
  if(previewStream) previewStream.getTracks().forEach(t=>t.stop());
  try {
    fullStream = await navigator.mediaDevices.getUserMedia({
      video:{facingMode:'user',width:{ideal:1280},height:{ideal:720}},
      audio:false
    });
    const vid = document.getElementById('camera-video');
    vid.srcObject = fullStream;
    await vid.play();

    document.getElementById('start-screen').style.display='none';
    document.getElementById('mirror-screen').style.display='block';

    applyRL(ringOn);

    // Start detection loops
    lightTimer = setInterval(detectLight, 900);
    complTimer = setInterval(()=>{ if(personPresent) cycleCompliment(); }, 5000);
    motionTimer= setInterval(detectPresence, 800);

  } catch(err){
    alert('Camera permission chahiye 📷\nPlease allow karo!');
  }
}

// ── Close mirror ──────────────────────────────────────
function closeMirror(){
  if(fullStream) fullStream.getTracks().forEach(t=>t.stop());
  clearInterval(lightTimer);
  clearInterval(complTimer);
  clearInterval(motionTimer);
  personPresent=false; autoRing=false; prevPixels=null;
  hideCompliment();
  document.getElementById('mirror-screen').style.display='none';
  document.getElementById('start-screen').style.display='flex';
  // Restart preview
  setTimeout(async ()=>{
    try{
      previewStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user'},audio:false});
      const pv=document.getElementById('preview-video');
      pv.srcObject=previewStream;
      await pv.play();
      pv.classList.add('show');
      document.getElementById('pill-frost').classList.add('clear');
      document.getElementById('mirror-label').style.display='none';
    }catch(e){}
  },300);
}

// ── Ring Light ────────────────────────────────────────
function applyRL(on){
  ringOn=on;
  document.getElementById('ring-light-effect').classList.toggle('on',on);
  document.getElementById('brightness-boost').classList.toggle('on',on);
  document.getElementById('rl-toggle').classList.toggle('active',on);
}
function toggleRLMirror(){
  autoRing=false;
  applyRL(!ringOn);
}

// ── Light Detection ────────────────────────────────────
function detectLight(){
  const vid=document.getElementById('camera-video');
  if(vid.readyState<2) return;
  const c=document.createElement('canvas');
  c.width=64;c.height=64;
  const cx=c.getContext('2d');
  cx.drawImage(vid,0,0,64,64);
  const d=cx.getImageData(0,0,64,64).data;
  let t=0;
  for(let i=0;i<d.length;i+=4) t+=(d[i]*0.299+d[i+1]*0.587+d[i+2]*0.114);
  const pct=Math.round((t/(64*64))/255*100);

  const dot=document.getElementById('light-dot');
  const txt=document.getElementById('light-txt');

  if(pct>50){
    dot.className='s-dot on';
    txt.textContent='Good light ☀️';
    if(autoRing){ autoRing=false; applyRL(false); }
  } else if(pct>20){
    dot.className='s-dot warn';
    txt.textContent='Normal light';
  } else {
    dot.className='s-dot warn';
    txt.textContent='Low light 💡 auto';
    if(!ringOn){ autoRing=true; applyRL(true); }
  }
}

// ── Presence Detection (motion/pixel change = person) ─
function detectPresence(){
  const vid=document.getElementById('camera-video');
  if(vid.readyState<2) return;
  const c=document.createElement('canvas');
  c.width=32;c.height=32;
  const cx=c.getContext('2d');
  cx.drawImage(vid,0,0,32,32);
  const d=cx.getImageData(0,0,32,32).data;

  // Get brightness of center region (where face would be)
  let centerBrightness=0, count=0;
  for(let y=8;y<24;y++){
    for(let x=8;x<24;x++){
      const i=(y*32+x)*4;
      centerBrightness+=(d[i]*0.299+d[i+1]*0.587+d[i+2]*0.114);
      count++;
    }
  }
  const avgCenter=centerBrightness/count;

  // Motion detection
  let motionScore=0;
  if(prevPixels){
    for(let i=0;i<d.length;i+=4){
      const diff=Math.abs(d[i]-prevPixels[i])+Math.abs(d[i+1]-prevPixels[i+1])+Math.abs(d[i+2]-prevPixels[i+2]);
      if(diff>20) motionScore++;
    }
  }
  prevPixels=new Uint8ClampedArray(d);

  const dot=document.getElementById('person-dot');
  const txt=document.getElementById('person-txt');

  // Person present = center has some brightness AND some pixels visible
  const hasContent = avgCenter > 8; // not completely black
  const hasMotionOrContent = hasContent || motionScore > 5;

  if(hasMotionOrContent && avgCenter > 5){
    dot.className='s-dot on';
    txt.textContent='Looking good 💕';
    if(!personPresent){
      personPresent=true;
      setTimeout(()=>showCompliment(),800); // slight delay before compliment
    }
  } else {
    dot.className='s-dot';
    txt.textContent='Step closer...';
    if(personPresent){ personPresent=false; hideCompliment(); }
  }
}

// ── Compliments ────────────────────────────────────────
function showCompliment(){
  if(!personPresent) return;
  pickCompliment();
  document.getElementById('compliment-wrap').classList.add('visible');
}
function hideCompliment(){
  document.getElementById('compliment-wrap').classList.remove('visible');
}
function pickCompliment(){
  let idx;
  do{ idx=Math.floor(Math.random()*COMPLIMENTS.length); }while(idx===lastIdx);
  lastIdx=idx;
  const box=document.getElementById('compliment-box');
  box.textContent=COMPLIMENTS[idx];
  box.classList.remove('pop-in');
  void box.offsetWidth;
  box.classList.add('pop-in');
}
function cycleCompliment(){ if(personPresent) pickCompliment(); }
</script>
</body>
</html>
